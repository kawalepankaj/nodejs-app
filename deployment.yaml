apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-deployment
  namespace: nodejs-app
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: nodejs-app
  template:
    metadata:
      labels:
        app: nodejs-app
    spec:
      containers:
      - name: nodejs-container
        image: pankajkawale21/nodejs-app:IMAGE_TAG 
        ports:
        - containerPort: 3000
